name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Mypy type check
        run: mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aumos_provenance_test
          POSTGRES_USER: aumos
          POSTGRES_PASSWORD: aumos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AUMOS_PROVENANCE_DATABASE_URL: postgresql+asyncpg://aumos:aumos@localhost:5432/aumos_provenance_test
      AUMOS_PROVENANCE_KAFKA_BOOTSTRAP_SERVERS: ""
      AUMOS_PROVENANCE_ENABLE_C2PA_SIGNING: "false"
      AUMOS_PROVENANCE_ENABLE_WATERMARKING: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --cov=aumos_content_provenance --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: aumos-content-provenance
