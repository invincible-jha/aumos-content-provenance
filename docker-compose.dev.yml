version: "3.9"

services:
  content-provenance:
    build:
      context: .
      target: base
    command: uvicorn aumos_content_provenance.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - AUMOS_PROVENANCE_DATABASE_URL=postgresql+asyncpg://aumos:aumos@postgres:5432/aumos_provenance
      - AUMOS_PROVENANCE_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - AUMOS_PROVENANCE_ENABLE_C2PA_SIGNING=false
      - AUMOS_PROVENANCE_ENABLE_WATERMARKING=true
      - AUMOS_PROVENANCE_WATERMARK_METHOD=dwtDct
      - AUMOS_PROVENANCE_WATERMARK_STRENGTH=0.3
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aumos_provenance
      POSTGRES_USER: aumos
      POSTGRES_PASSWORD: aumos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aumos -d aumos_provenance"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
